name: Build and Deploy

env:
  ANYPOINT_CLIENT_ID: ${{ secrets.AP_CLIENT_ID }}
  ANYPOINT_CLIENT_SECRET: ${{ secrets.AP_CLIENT_SECRET }}
  CONNECTED_APP_STRING: ${{ secrets.CONNECTED_APP_STRING }}
  CONNECTED_APP_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
  CONNECTED_APP_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
  GRANT_TYPE: ${{ secrets.GRANT_TYPE }}
  PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
  TARGET: ${{ vars.TARGET }}
  ENVIRONMENT: "${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Enter the repository name'
        required: true
        type: string
      branch:
        description: 'Branch to build'
        required: true
        default: 'dev'
        type: string
      environment:
        description: "Deployment Environment"
        required: true
        type: choice
        options:
          - DEV
          - UAT
          - PROD
      vCore:
        description: "vCore on Deployment Target"
        required: true
        type: choice
        options:
          - "0.1"
          - "0.2"
          - "0.5"
          - "1"
      replicas:
        description: "Number of Replicas on Deployment Target"
        required: true
        type: choice
        options:
          - "1"
          - "2"

run-name: "Deploying ${{ inputs.repository }} to ${{ inputs.environment }}"

jobs:
  Build-Publish-Deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Maven 3.9.9
        uses: s4u/setup-maven-action@v1.12.0
        with:
          java-version: 17
          maven-version: 3.9.9
          
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: 'UrbanLandInstitute/${{ inputs.repository }}'
          ref: '${{ inputs.branch }}'
          token: "${{ env.GLOBAL_PAT_TOKEN }}"
          fetch-depth: 0

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.1.0
        with:
          servers: >
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "~~~Client~~~",
                "password": "${{ env.GLOBAL_CONNECTED_APP_STRING }}"
              },
              {
                "id": "MuleRepository",
                "username": "${{ env.GLOBAL_NEXUS_USERNAME }}",
                "password": "${{ env.GLOBAL_NEXUS_PASSWORD }}"
              }
            ] 
          repositories: >
            [
              {
                "id": "anypoint-exchange-v3",
                "url": "https://maven.anypoint.mulesoft.com/api/v3/maven",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              },
              {
                "id": "MuleRepository",
                "url": "https://repository.mulesoft.org/nexus-ee/content/repositories/releases-ee/",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]

      - name: Set Maven Profile and App Tag
        run: |
          if [[ "${{ inputs.repository }}" == *"exp-api"* ]]; then
            echo "MAVEN_PROFILE=experience-service" >> $GITHUB_ENV
          else
            echo "MAVEN_PROFILE=non-experience-service" >> $GITHUB_ENV
          fi
          
          MULE_ENV=$(echo '${{ inputs.environment }}' | tr '[:upper:]' '[:lower:]')
          if [[ "$MULE_ENV" == "dev" || "$MULE_ENV" == "uat" ]]; then
            echo "APP_TAG=-$MULE_ENV" >> $GITHUB_ENV
          else
            echo "APP_TAG=" >> $GITHUB_ENV
          fi

      - name: Publish to Exchange
        run: |
          mvn clean deploy -DskipTests \
          -D"mule.env"="${{ env.GLOBAL_ENVIRONMENT }}" \
          -D"mule.key"="${{ env.GLOBAL_ENCRYPTION_KEY }}" \
          -D"connectedAppClientId"="${{ env.GLOBAL_CONNECTED_APP_CLIENT_ID }}" \
          -D"connectedAppClientSecret"="${{ env.GLOBAL_CONNECTED_APP_CLIENT_SECRET }}" \
          -D"connectedAppGrantType"="${{ env.GLOBAL_GRANT_TYPE }}" \
          -P"${{ env.MAVEN_PROFILE }}"

      - name: Deploy to CloudHub 2.0 (${{ inputs.environment }}) 
        run: |
          mvn deploy -DskipTests -DmuleDeploy \
          -D"mule.env"="${{ env.GLOBAL_ENVIRONMENT }}" \
          -D"mule.key"="${{ env.GLOBAL_ENCRYPTION_KEY }}" \
          -D"app.vCores"="${{ inputs.vCore }}" \
          -D"app.replicas"="${{ inputs.replicas }}" \
          -D"app.url.env"="${{ env.APP_TAG }}" \
          -D"anypoint.privatespace.name"="${{ env.GLOBAL_TARGET }}" \
          -D"connectedAppClientId"="${{ env.GLOBAL_CONNECTED_APP_CLIENT_ID }}" \
          -D"connectedAppClientSecret"="${{ env.GLOBAL_CONNECTED_APP_CLIENT_SECRET }}" \
          -D"connectedAppGrantType"="${{ env.GLOBAL_GRANT_TYPE }}" \
          -D"anypoint.platform.client_id"="${{ env.GLOBAL_ANYPOINT_CLIENT_ID }}" \
          -D"anypoint.platform.client_secret"="${{ env.GLOBAL_ANYPOINT_CLIENT_SECRET }}" \
          -P"${{ env.MAVEN_PROFILE }}"